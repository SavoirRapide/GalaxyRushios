workflows:
  ios-capacitor-workflow:
    name: Galaxy Rush iOS Build 1.0.6
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: AppStoreGalaxyRush

    environment:
      xcode: latest
      node: 22
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.a2games.galaxyrush
      vars:
        ADMOB_APP_ID: "ca-app-pub-2409581870901167~7654643904"

    scripts:

      # 🔥 INSTALL PROPRE (RESET TOTAL)
      - name: Clean Install Dependencies
        script: |
          rm -rf node_modules
          rm -f package-lock.json

          npm install

          # Capacitor propre (versions cohérentes)
          npm install @capacitor/core @capacitor/cli @capacitor/ios

          # Nettoyage conflit
          npm uninstall @capacitor-firebase/app || true

      # 🔧 BUILD WEB
      - name: Build web assets
        script: |
          npm run build || echo "Skip build"

      # ⚙️ SYNC CAPACITOR (SPM)
      - name: Sync Capacitor
        script: |
          npx cap sync ios

      # 📱 CONFIG APP (AdMob + version)
      - name: Configure AdMob & Version
        script: |
          cd ios/App/App
          /usr/libexec/PlistBuddy -c "Delete :GADApplicationIdentifier" Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string $ADMOB_APP_ID" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.6" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" Info.plist

      # 🎮 GAME CENTER
      - name: Enable Game Center
        script: |
          cd ios/App

          cat << 'EOF' > App/App.entitlements
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.game-center</key>
              <true/>
          </dict>
          </plist>
          EOF

          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          target = project.targets.find { |t| t.name == 'App' }

          if target
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements'
            end
            project.save
            puts '✅ Game Center activé'
          else
            puts '❌ Target App introuvable'
            exit 1
          end
          "

      # 🔐 SIGNING
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      # 🚀 BUILD FINAL
      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa --project "App.xcodeproj" --scheme App --clean

    artifacts:
      - ios/build/ios/ipa/*.ipa
      - "*.ipa"

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
