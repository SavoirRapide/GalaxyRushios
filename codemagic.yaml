workflows:
  ios-capacitor-workflow:
    name: Galaxy Rush iOS Build 1.0.6
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: AppStoreGalaxyRush

    environment:
      xcode: latest
      node: 20 # 🟢 Retour à la stabilité LTS
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.a2games.galaxyrush
      vars:
        ADMOB_APP_ID: "ca-app-pub-2409581870901167~7654643904"

    scripts:
      # 🔥 INSTALLATION NETTE
      - name: Install dependencies
        script: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/ios capacitor-game-connect
          npm uninstall @capacitor-firebase/app || true

      - name: Build web assets
        script: |
          npm run build || echo "Skip build"

      # ⚙️ SYNC CAPACITOR (La commande qui ne peut pas rater)
      - name: Sync Capacitor
        script: |
          # On lui donne le nom exact du package pour éviter l'erreur d'exécutable
          npx @capacitor/cli sync ios

      # 📱 CONFIG APP
      - name: Configure AdMob & Version
        script: |
          cd ios/App/App
          /usr/libexec/PlistBuddy -c "Delete :GADApplicationIdentifier" Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string $ADMOB_APP_ID" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.6" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" Info.plist

      # 🎮 GAME CENTER (C'est là que ton package.json va briller)
      - name: Enable Game Center
        script: |
          cd ios/App
          cat << 'EOF' > App/App.entitlements
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.game-center</key>
              <true/>
          </dict>
          </plist>
          EOF

          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          target = project.targets.find { |t| t.name == 'App' }
          if target
            target.build_configurations.each { |c| c.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements' }
            project.save
            puts '✅ Game Center injecté'
          else
            exit 1
          end
          "

      # 🔐 SIGNING
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      # 🚀 BUILD FINAL
      - name: Build IPA
        script: |
          cd ios/App
          # On résout les paquets Swift avant de lancer l'IPA
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App
          xcode-project build-ipa --project "App.xcodeproj" --scheme App --clean

    artifacts:
      - ios/build/ios/ipa/*.ipa
      - "*.ipa"

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
