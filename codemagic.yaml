workflows:
  ios-capacitor-workflow:
    name: Galaxy Rush iOS Build 1.0.6
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: AppStoreGalaxyRush
    environment:
      xcode: latest
      node: 20
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.a2games.galaxyrush
      vars:
        ADMOB_APP_ID: "ca-app-pub-2409581870901167~7654643904"
        
    scripts:
      - name: Install JS Dependencies and Web Assets
        script: |
          npm install --legacy-peer-deps
          npm run build || echo "Skip build"

      - name: Cocoapods installation
        script: |
          cd ios/App && pod install

      - name: Capacitor Sync
        script: |
          npx cap sync ios

      - name: Configure Info.plist
        script: |
          cd ios/App/App
          /usr/libexec/PlistBuddy -c "Delete :GADApplicationIdentifier" Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string $ADMOB_APP_ID" Info.plist
          
          /usr/libexec/PlistBuddy -c "Delete :NSUserTrackingUsageDescription" Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :NSUserTrackingUsageDescription string 'We use your data to show you personalized ads and improve your experience.'" Info.plist
          
          /usr/libexec/PlistBuddy -c "Delete :UIRequiredDeviceCapabilities" Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :UIRequiredDeviceCapabilities array" Info.plist
          /usr/libexec/PlistBuddy -c "Add :UIRequiredDeviceCapabilities:0 string gamekit" Info.plist
          
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.6" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" Info.plist

      - name: Enable Game Center Entitlements
        script: |
          cd ios/App
          cat << 'EOF' > App/App.entitlements
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.game-center</key>
              <true/>
          </dict>
          </plist>
          EOF
          gem install xcodeproj
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          target = project.targets.find { |t| t.name == 'App' }
          target.build_configurations.each do |config|
            config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements'
          end
          project.save
          "

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa --workspace "App.xcworkspace" --scheme App --clean

    artifacts:
      - ios/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
