workflows:
  ios-capacitor-workflow:
    name: Galaxy Rush iOS Build 1.0.6
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: AppStoreGalaxyRush

    environment:
      xcode: latest
      node: 20 # 🟢 On reste sur la 20 (LTS) pour la stabilité des chemins
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.a2games.galaxyrush
      vars:
        ADMOB_APP_ID: "ca-app-pub-2409581870901167~7654643904"

    scripts:
      # 🔥 ÉTAPE ATOMIQUE : INSTALL + SYNC
      - name: Install and Sync Capacitor
        script: |
          echo "1. Nettoyage profond..."
          rm -rf node_modules package-lock.json ios/App/CapApp-SPM
          
          echo "2. Installation des dépendances..."
          # On installe tout d'un coup avec --legacy-peer-deps pour éviter les blocages
          npm install --legacy-peer-deps
          
          echo "3. Vérification des fichiers..."
          ls node_modules/@capacitor/ios/package.json || echo "⚠️ iOS plugin manquant !"
          
          echo "4. Synchronisation forcée..."
          # On utilise le chemin direct pour être SÛR à 100% d'utiliser la bonne version
          node node_modules/@capacitor/cli/bin/capacitor sync ios --no-install

      - name: Build web assets
        script: |
          npm run build || echo "Skip build"

      - name: Configure AdMob & Version
        script: |
          cd ios/App/App
          /usr/libexec/PlistBuddy -c "Delete :GADApplicationIdentifier" Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string $ADMOB_APP_ID" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.6" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" Info.plist

      - name: Enable Game Center
        script: |
          cd ios/App
          cat << 'EOF' > App/App.entitlements
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.game-center</key>
              <true/>
          </dict>
          </plist>
          EOF

          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          target = project.targets.find { |t| t.name == 'App' }
          if target
            target.build_configurations.each { |c| c.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements' }
            project.save
            puts '✅ Entitlements injectés'
          end
          "

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd ios/App
          # On force Xcode à voir les nouveaux plugins SPM
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App
          # Build final
          xcode-project build-ipa --project "App.xcodeproj" --scheme App --clean

    artifacts:
      - ios/build/ios/ipa/*.ipa
      - "*.ipa"

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
