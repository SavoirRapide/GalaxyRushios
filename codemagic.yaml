workflows:
  ios-capacitor-workflow:
    name: Galaxy Rush iOS Build 1.0.6
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: AppStoreGalaxyRush
    environment:
      xcode: latest
      node: 20
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.a2games.galaxyrush
        provisioning_profile_specifier: "EWWW"
      vars:
        ADMOB_APP_ID: "ca-app-pub-2409581870901167~7654643904"
    scripts:
      - name: Install JS Dependencies
        script: |
          npm install @capacitor/core@^7.0.0 @capacitor/ios@^7.0.0 @capacitor/cli@^7.0.0 --legacy-peer-deps
          npm install @capacitor-community/admob@^8.0.0 --legacy-peer-deps
          npm install @openforge/capacitor-game-connect --legacy-peer-deps

      - name: Capacitor Sync
        script: |
          npx cap sync ios

      - name: Debug - Find Package.swift
        script: |
          echo "📁 Structure ios/App :"
          find ios/App -name "*.swift" -o -name "*.xcworkspace" -o -name "Podfile" | head -30
          echo "--- Tous les Package.swift ---"
          find ios -name "Package.swift" 2>/dev/null
          echo "--- Contenu ios/App ---"
          ls -la ios/App/
          echo "--- Contenu ios/App/CapApp-SPM ---"
          ls -la ios/App/CapApp-SPM/ 2>/dev/null || echo "Dossier CapApp-SPM absent"

      - name: Patch Package.swift for capacitor-swift-pm 8.x
        script: |
          echo "🔍 Recherche du Package.swift..."
          find ios -name "Package.swift" | xargs grep -l "capacitor-swift-pm" 2>/dev/null || echo "Aucun fichier trouvé"
          for PKG in $(find ios -name "Package.swift" | xargs grep -l "capacitor-swift-pm" 2>/dev/null); do
            echo "📝 Patching $PKG"
            sed -i '' 's/exact: "[0-9.]*"/.upToNextMajor(from: "8.0.0")/' "$PKG" || true
            sed -i '' 's/from: "7\.[0-9.]*"/from: "8.0.0"/' "$PKG" || true
            echo "✅ Contenu final de $PKG :"
            cat "$PKG"
          done

      - name: Force Clean & Resolve SPM Dependencies
        script: |
          cd ios/App
          rm -f App.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App

      - name: Configure Info.plist
        script: |
          cd ios/App/App
          /usr/libexec/PlistBuddy -c "Delete :GADApplicationIdentifier" Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string $ADMOB_APP_ID" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.6" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" Info.plist

      - name: Enable Game Center Entitlements
        script: |
          cd ios/App
          if [ ! -f App/App.entitlements ]; then
            cat > App/App.entitlements << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          </dict>
          </plist>
          EOF
          fi
          /usr/libexec/PlistBuddy -c "Add :com.apple.developer.game-center bool true" App/App.entitlements || true
          gem install xcodeproj --no-document
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          target = project.targets.find { |t| t.name == 'App' }
          target.build_configurations.each do |config|
            config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements'
          end
          project.save
          puts '✅ Entitlements configured'
          "

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd ios/App
          echo "🔍 Build verbose pour voir l'erreur réelle..."
          set -o pipefail
          xcodebuild \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/ios/xcarchive/App.xcarchive \
            CODE_SIGN_ENTITLEMENTS=App/App.entitlements \
            COMPILER_INDEX_STORE_ENABLE=NO \
            DEVELOPMENT_TEAM=ALUCSWR3FW \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CODE_SIGN_STYLE=Manual \
            archive 2>&1 | grep -E "error:|warning:|fatal|Build succeeded|Build FAILED" | tail -80 || true
          
          echo "🔍 Tentative build-ipa..."
          xcode-project build-ipa \
            --project "App.xcodeproj" \
            --scheme App \
            --clean \
            --archive-flags "CODE_SIGN_ENTITLEMENTS=App/App.entitlements"

      - name: Verify Game Center in build
        script: |
          echo "🔍 Checking entitlements in final build..."
          codesign -d --entitlements :- ios/App/build/*.app 2>/dev/null || \
          codesign -d --entitlements :- ios/App/App.xcarchive/Products/Applications/*.app || true

    artifacts:
      - ios/App/build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
