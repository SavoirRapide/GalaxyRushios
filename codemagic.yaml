workflows:
  ios-capacitor-workflow:
    name: Galaxy Rush iOS Build 1.0.6
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: AppStoreGalaxyRush

    environment:
      xcode: latest
      node: 22
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.a2games.galaxyrush
      vars:
        ADMOB_APP_ID: "ca-app-pub-2409581870901167~7654643904"

    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm uninstall @capacitor-firebase/app || true

      - name: Build web assets
        script: |
          npm run build || echo "Skip build"

      - name: Sync and Cleanup Capacitor
        script: |
          npx cap cleanup ios
          npx cap sync ios

      - name: Configure AdMob & Version
        script: |
          cd ios/App/App
          /usr/libexec/PlistBuddy -c "Delete :GADApplicationIdentifier" Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string $ADMOB_APP_ID" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.6" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" Info.plist

      - name: Fix Game Center Entitlements
        script: |
          cd ios/App
          echo "1. Création du fichier App.entitlements..."
          cat << 'EOF' > App/App.entitlements
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.game-center</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          echo "2. Injection sur le target App..."
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          target = project.targets.find { |t| t.name == 'App' }
          if target
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements'
            end
            project.save
            puts '✅ Entitlements injectés'
          else
            puts '❌ Erreur : Target App non trouvé'
            exit 1
          end
          "

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd ios
          
          # On cherche le VRAI workspace en excluant les dossiers internes d'Xcode
          WORKSPACE=$(find . -maxdepth 2 -name "*.xcworkspace" | grep -v ".xcodeproj" | head -n 1)

          if [ -n "$WORKSPACE" ]; then
            echo "✅ VRAI Workspace trouvé : $WORKSPACE"
            xcode-project build-ipa --workspace "$WORKSPACE" --scheme App
          else
            echo "⚠️ Aucun workspace CocoaPods trouvé -> fallback sur .xcodeproj"
            xcode-project build-ipa --project "App/App.xcodeproj" --scheme App
          fi

    artifacts:
      - ios/build/ios/ipa/*.ipa
      - "*.ipa"

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
