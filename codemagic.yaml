workflows:
  ios-capacitor-workflow:
    name: Galaxy Rush iOS Build 1.0.6
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: AppStoreGalaxyRush

    environment:
      xcode: latest
      node: 22
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.a2games.galaxyrush
      vars:
        ADMOB_APP_ID: "ca-app-pub-2409581870901167~7654643904"

    scripts:
      - name: Install dependencies
        script: |
          npm install
          npm uninstall @capacitor-firebase/app || true

      - name: Build web assets
        script: |
          npm run build || echo "Skip build"

      - name: Sync and Cleanup Capacitor
        script: |
          npx cap cleanup ios
          npx cap sync ios

      - name: Configure AdMob & Version
        script: |
          cd ios/App/App
          /usr/libexec/PlistBuddy -c "Delete :GADApplicationIdentifier" Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string $ADMOB_APP_ID" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.6" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" Info.plist

      # ✅ LA SOLUTION PROPRE (SANS CONFLIT DE SIGNATURE)
      - name: Enable Game Center Capability
        script: |
          cd ios/App
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          target = project.targets.first
          
          # Ajoute la capacité proprement dans les build settings
          target.add_capability('GameCenter')
          
          project.save
          "

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa --workspace "App.xcworkspace" --scheme App

    artifacts:
      - ios/build/ios/ipa/*.ipa
      - "*.ipa"

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
