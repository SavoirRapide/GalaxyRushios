workflows:
  ios-capacitor-workflow:
    name: Galaxy Rush iOS Build 1.0.6
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: AppStoreGalaxyRush

    environment:
      xcode: latest
      node: 22
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.a2games.galaxyrush
      vars:
        ADMOB_APP_ID: "ca-app-pub-2409581870901167~7654643904"

    scripts:
      - name: Install dependencies
        script: |
          npm install
          # On s'assure que le plugin Game Center est présent
          npm install capacitor-game-connect
          npm uninstall @capacitor-firebase/app || true

      - name: Build web assets
        script: |
          npm run build || echo "Skip build"

      - name: Sync Capacitor (SPM Mode)
        script: |
          npx cap sync ios

      - name: Configure AdMob & Version
        script: |
          cd ios/App/App
          /usr/libexec/PlistBuddy -c "Delete :GADApplicationIdentifier" Info.plist || true
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string $ADMOB_APP_ID" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.6" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" Info.plist

      - name: Fix Game Center Entitlements
        script: |
          cd ios/App
          # On crée le fichier d'entitlements à la racine du dossier App
          cat << 'EOF' > App/App.entitlements
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.developer.game-center</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          ruby -e "
          require 'xcodeproj'
          project = Xcodeproj::Project.open('App.xcodeproj')
          target = project.targets.find { |t| t.name == 'App' }
          if target
            target.build_configurations.each do |config|
              # On pointe vers le fichier qu'on vient de créer
              config.build_settings['CODE_SIGN_ENTITLEMENTS'] = 'App/App.entitlements'
            end
            project.save
          end
          "

      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Resolve Swift Packages
        script: |
          cd ios/App
          # Étape CRITIQUE pour Xcode 16 / SPM
          xcodebuild -resolvePackageDependencies -project App.xcodeproj -scheme App

      - name: Build IPA
        script: |
          cd ios/App
          # On utilise les drapeaux de nettoyage pour éviter les vieux résidus
          xcode-project build-ipa --project "App.xcodeproj" --scheme App --clean

    artifacts:
      - ios/build/ios/ipa/*.ipa
      - "*.ipa"

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
