workflows:
  ios-capacitor-workflow:
    name: Galaxy Rush iOS Build 1.1.2
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Codemagica
    environment:
      groups:
        - signin
      xcode: latest
      node: 20
      cocoapods: default
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.a2games.galaxyrush
    scripts:
      - name: Install JS Dependencies
        script: |
          npm install --legacy-peer-deps
      - name: Capacitor Sync
        script: |
          npx cap sync ios
      - name: Install CocoaPods (Appodeal + adapters)
        script: |
          cd ios/App
          pod install --repo-update
      - name: Configure Info.plist
        script: |
          cd ios/App/App
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.1.2" Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" Info.plist
      - name: Set up code signing
        script: |
          xcode-project use-profiles
      - name: Build IPA
        script: |
          cd ios/App
          xcode-project build-ipa \
            --workspace "App.xcworkspace" \
            --scheme App \
            --clean
    artifacts:
      - ios/App/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
